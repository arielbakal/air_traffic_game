services:

  ollama:
    image: ollama/ollama:latest
    container_name: atc-ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: atc-backend
    env_file:
      - .env
    environment:
      PORT: "3001"
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ""
    container_name: atc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_models:
